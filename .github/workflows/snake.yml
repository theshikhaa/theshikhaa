name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: theshikhaa
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/theshikhaa/theshikhaa.git
          mkdir -p output-build
          cp dist/github-contribution-grid-snake.svg output-build/
          git add --all && git stash || true
          git fetch origin output:output || git checkout -b output
          git checkout output
          git rm -rf . || true
          cp output-build/github-contribution-grid-snake.svg .
          git add github-contribution-grid-snake.svg
          git commit -m "Update snake animation" --allow-empty
          git push -u origin output --force
