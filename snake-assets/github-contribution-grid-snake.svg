    <rect x="220" y="100" width="40" height="40" />
    <rect x="260" y="100" width="40" height="40" />
    <rect x="300" y="100" width="40" height="40" />
    <rect x="300" y="140" width="40" height="40" />
    <rect x="300" y="180" width="40" height="40" />
    <rect x="300" y="220" width="40" height="40" />
    <rect x="260" y="220" width="40" height="40" />
    <rect x="220" y="220" width="40" height="40" />
    <rect x="180" y="220" width="40" height="40" />
    <rect x="140" y="220" width="40" height="40" />
